name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only need to read this repo; the cross-repo publish uses PAGES_DEPLOY_TOKEN.
permissions:
  contents: read

concurrency:
  group: blog-deploy
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout source
        uses: actions/checkout@v5

      - name: install nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: build site (flake dist target → minified static html)
        run: nix build -L .#dist

      - name: publish to vibec0re.github.io
        env:
          # SSH private key for a write deploy key on vibec0re/vibec0re.github.io
          DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_KEY:-}" ]; then
            echo "::error::secret PAGES_DEPLOY_KEY is not set"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/pages_deploy
          chmod 600 ~/.ssh/pages_deploy
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/pages_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          git clone --depth 1 git@github.com:vibec0re/vibec0re.github.io.git out

          # wipe everything except .git and .github (the Pages workflow lives in the output repo)
          find out -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          # nix build output is a read-only store symlink; deref-copy then make writable
          cp -rL result/. out/
          chmod -R u+w out

          cd out
          git add -A
          if git diff --cached --quiet; then
            echo "==> no changes to publish"
            exit 0
          fi
          git -c user.name="vibec0re-ci" \
              -c user.email="ci@users.noreply.github.com" \
              commit -m "publish: w3bsite@${GITHUB_SHA}"
          # deploy-key push (not GITHUB_TOKEN) → triggers the output repo's Pages workflow
          git push origin HEAD:main
          echo "==> published; vibec0re.github.io Pages deploy will run next"
